<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<script src="plotly.min.js"></script>
<style>
html,body{
height:100%;
width:100%;
margin:0;
background:transparent;
}
#plot{
height:100%;
width:100%;
background:transparent;
}
#plot .modebar{
position:absolute !important;
top:8px !important;
right:8px !important;
background:rgba(255,255,255,0.65);
border-radius:6px;
padding:2px;
transition:opacity .12s ease;
}
#plot .modebar-btn{
opacity:0.85;
}
#plot .modebar-btn:hover{
opacity:1;
}
</style>
</head>
<body>
<div id="plot"></div>
<script>
let gd = null;
window.traceMap = {};

document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

function buildTraceMap(data) {
    window.traceMap = {};
    if (!data) return;
    for (let i = 0; i < data.length; i++) {
        if (data[i].name != null) window.traceMap[data[i].name] = i;
    }
}

function installModebarHover(plot){
    const modebar = plot.querySelector(".modebar");
    if(!modebar) return;
    modebar.style.opacity = "0";
    modebar.style.pointerEvents = "none";
    plot.addEventListener("mouseenter", ()=>{
        modebar.style.opacity = "1";
        modebar.style.pointerEvents = "auto";
    });
    plot.addEventListener("mouseleave", ()=>{
        modebar.style.opacity = "0";
        modebar.style.pointerEvents = "none";
    });
}
function attachHandlers(plot){
    // double-click reset
    plot.on('plotly_doubleclick', function() {
        Plotly.relayout(plot, {
            'xaxis.autorange': true,
            'yaxis.autorange': true
        });
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === "Escape") {
            Plotly.relayout(plot, {
                'xaxis.autorange': true,
                'yaxis.autorange': true
            });
        }
    });
}
function appendData(payload) {
    const { name, x, y } = payload;
    if (!gd) return;
    const idx = window.traceMap[name];
    if (idx === undefined) {
        console.warn("appendData: unknown trace:", name, "known:", Object.keys(window.traceMap));
        return;
    }
    Plotly.extendTraces(
        "plot",
        {
            x: [x],
            y: [y],
        },
        [idx]
    );
}
window.renderFigure = function(figJSON, cfgJSON) {
    try {
        const fig = JSON.parse(figJSON);
        const cfg = JSON.parse(cfgJSON);
        const plot = document.getElementById("plot");
        if (!gd) {
            gd = plot;
            Plotly.newPlot(gd, fig.data, fig.layout, cfg).then(() => {
                buildTraceMap(gd.data);
                installModebarHover(gd);
                attachHandlers(gd);
            });
        } else {
            Plotly.react(gd, fig.data, fig.layout, cfg).then(() => {
                buildTraceMap(gd.data);
            });
        }
        // apply paper background only 
        const paper = (fig.layout && fig.layout.paper_bgcolor) || "transparent";
        document.documentElement.style.background = paper;
        document.body.style.background = paper;
    } catch(err) {
        console.error("renderFigure error:", err);
    }
};
</script>
</body>
</html>
